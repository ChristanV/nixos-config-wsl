version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.7.5
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    # Security scanning (equivalent to gitleaks)
    - git-diff-check
    - markdownlint@0.48.0
    - nix-flake-check
    - nixpkgs-fmt@1.3.0
    - prettier@3.8.1
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - gitleaks@8.29.0

    # Built-in formatters and linters (equivalent to pre-commit-hooks)
    - trufflehog@3.90.13 # Additional security scanning
    - checkov@3.2.507 # Infrastructure security

    # YAML checking
    - yamllint@1.38.0

    # Nix tooling

    - deadnix@SYSTEM
    - statix@SYSTEM

  definitions:
    - name: nixfmt
      files: [nix]
      commands:
        - output: rewrite
          run: nixfmt ${target}
          success_codes: [0]
    - name: deadnix
      files: [nix]
      commands:
        - output: sarif
          success_codes: [0, 1]
          run: deadnix --output-format json ${target}
    - name: statix
      files: [nix]
      commands:
        - output: sarif
          success_codes: [0, 1]
          run: statix check --format json ${target}
    - name: nix-flake-check
      files: [nix]
      commands:
        - output: rewrite
          formatter: true
          run: nix flake check
          success_codes: [0]
      suggest_if: config_present
      direct_configs:
        - flake.nix
      known_good_version: system
      environment:
        - name: PATH
          list: ["${workspace}"]

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available

# Custom actions for Nix flake check
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
    - rust@1.82.0
