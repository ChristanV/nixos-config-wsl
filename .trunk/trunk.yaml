---
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.5
      uri: https://github.com/trunk-io/plugins

lint:
  ignore:
    - linters: [ALL]
      paths: [hardware-configuration.nix]
  enabled:
    - checkov@3.2.507
    - trufflehog@3.90.13
    - git-diff-check
    - gitleaks@8.30.0
    - statix@SYSTEM
    - deadnix@SYSTEM
    - nixfmt@SYSTEM
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - yamllint@1.38.0
    - markdownlint@0.48.0
    - prettier@3.8.1

  definitions:
    - name: nixfmt
      files: [nix]
      commands:
        - output: rewrite
          run: nixfmt -
          stdin: true
          success_codes: [0]
      environment:
        - name: PATH
          list: ["${env.HOME}/.nix-profile/bin", /run/current-system/sw/bin]

    - name: deadnix
      files: [nix]
      commands:
        - name: lint
          output: sarif
          run: deadnix --output-format json ${target}
          success_codes: [0, 1]
          read_output_from: stdout

    - name: statix
      files: [nix]
      commands:
        - name: lint
          output: sarif
          run: statix check --format json ${target}
          success_codes: [0, 1]
          read_output_from: stdout

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - nix-flake-check

  definitions:
    - id: nix-flake-check
      description: Run nix flake check on the whole repo
      run: nix flake check
      triggers:
        - git_hooks: [pre-push]

runtimes:
  enabled:
    - go@1.21.0
    - rust@1.82.0
    - node@22.16.0
    - python@3.10.8
